version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sse-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sse_dev}
      POSTGRES_USER: ${POSTGRES_USER:-sse_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sse_password_dev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-sse_user} -d ${POSTGRES_DB:-sse_dev}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sse-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-sse_redis_dev}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-sse_redis_dev}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    container_name: sse-n8n
    restart: unless-stopped
    ports:
      - '5678:5678'
    environment:
      N8N_BASIC_AUTH_ACTIVE: 'true'
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:-admin}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-sse_dev}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-sse_user}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-sse_password_dev}
      DB_POSTGRESDB_SCHEMA: n8n
    volumes:
      - n8n-data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
  n8n-data:
