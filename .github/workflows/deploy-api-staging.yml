name: Deploy API (Staging)

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'infra/docker/api.Dockerfile'
      - 'apps/api/fly.toml'
      - '.github/workflows/deploy-api-staging.yml'
  workflow_dispatch:

concurrency:
  group: deploy-api-staging
  cancel-in-progress: false

jobs:
  migrate:
    name: Run migrations against Neon
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter @sse/shared-types build
          pnpm --filter @sse/shared-utils build

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.DATABASE_URL_UNPOOLED }}" ]; then
            echo "::error::Secret DATABASE_URL_UNPOOLED is not set. Configure it in Settings → Secrets."
            exit 1
          fi

      - name: Apply SQL migrations
        env:
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
        run: pnpm --filter @sse/api migration:run

  deploy:
    name: Deploy to Fly.io
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.FLY_API_TOKEN }}" ]; then
            echo "::error::Secret FLY_API_TOKEN is not set. Configure it in Settings → Secrets."
            exit 1
          fi

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only -c apps/api/fly.toml

      - name: Smoke test — liveness probe
        id: smoke
        continue-on-error: true
        run: |
          echo "Waiting for cold start (first request triggers auto-start)..."
          for i in 1 2 3 4 5 6 7 8; do
            if curl --fail --silent --show-error --max-time 60 https://sse-api-staging.fly.dev/health; then
              echo ""
              echo "API is live on attempt $i"
              exit 0
            fi
            echo "attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Liveness probe failed after 8 attempts"
          exit 1

      - name: Capture Fly.io logs (diagnostic)
        if: always()
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          echo "=== Machine status ==="
          flyctl machine list --app sse-api-staging 2>&1 || true
          echo ""
          echo "=== Last 60 log lines ==="
          flyctl logs --app sse-api-staging -n 60 2>&1 || true

      - name: Fail if smoke test failed
        if: steps.smoke.outcome == 'failure'
        run: exit 1
