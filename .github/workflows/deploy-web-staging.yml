name: Deploy Web (Staging)

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - '.github/workflows/deploy-web-staging.yml'
  workflow_dispatch:

concurrency:
  group: deploy-web-staging
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          _VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          _VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          missing=""
          [ -z "$VERCEL_TOKEN" ] && missing="$missing VERCEL_TOKEN"
          [ -z "$_VERCEL_ORG_ID" ] && missing="$missing VERCEL_ORG_ID"
          [ -z "$_VERCEL_PROJECT_ID" ] && missing="$missing VERCEL_PROJECT_ID"
          if [ -n "$missing" ]; then
            echo "::error::Missing secrets:$missing. Configure them in Settings → Secrets."
            exit 1
          fi

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build project artifacts
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "deployment_url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $DEPLOYMENT_URL"

      - name: Smoke test — frontend loads
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5; do
            if curl --fail --silent --show-error --max-time 10 --output /dev/null https://sse-web-staging.vercel.app; then
              echo "Web is up"
              exit 0
            fi
            echo "attempt $i: not up yet, retrying in 5s..."
            sleep 5
          done
          echo "Smoke test failed after 5 attempts"
          exit 1

      - name: Smoke test — backend reachable and API auth (CA5)
        run: |
          set -euo pipefail
          # Architecture note: api.ts calls NEXT_PUBLIC_API_URL directly (not via Next.js rewrites).
          # CA5 validates: backend up + auth enforced. next.config.js fail-fast guard ensures
          # NEXT_PUBLIC_API_URL is set at build time (build fails if missing on Vercel).
          BACKEND=https://sse-api-staging.fly.dev
          FAILED=0

          # Step 1: backend health (liveness) — allow 45s for Fly.io cold start
          BACKEND_HEALTH=$(curl --silent --max-time 45 --output /dev/null --write-out "%{http_code}" "$BACKEND/health")
          if [ "$BACKEND_HEALTH" != "200" ]; then
            echo "::error::Backend unreachable: GET $BACKEND/health → $BACKEND_HEALTH. Check Fly.io (T-20260412-1)."
            exit 1
          fi
          echo "PASS: GET $BACKEND/health → $BACKEND_HEALTH ✓"

          # Step 2: backend readiness (db + redis up)
          BACKEND_READY=$(curl --silent --max-time 30 --output /dev/null --write-out "%{http_code}" "$BACKEND/ready")
          if [ "$BACKEND_READY" != "200" ]; then
            echo "::warning::Backend readiness: GET $BACKEND/ready → $BACKEND_READY (db/redis may be slow)"
          else
            echo "PASS: GET $BACKEND/ready → $BACKEND_READY ✓"
          fi

          # Step 3: auth is enforced on backend API routes (must return 401, not 404/502/503)
          for path in "api/v1/tenants/me/wizard/status" "api/v1/customers"; do
            STATUS=$(curl --silent --max-time 20 --output /dev/null --write-out "%{http_code}" "$BACKEND/$path")
            if [ "$STATUS" = "401" ] || [ "$STATUS" = "403" ]; then
              echo "PASS: GET $BACKEND/$path → $STATUS (auth enforced) ✓"
            else
              echo "::error::Auth check FAILED: GET $BACKEND/$path → $STATUS (expected 401/403)"
              FAILED=1
            fi
          done

          [ "$FAILED" = "0" ] || exit 1
          echo "All CA5 smoke tests passed"
