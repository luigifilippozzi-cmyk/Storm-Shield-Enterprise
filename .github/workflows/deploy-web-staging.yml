name: Deploy Web (Staging)

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - '.github/workflows/deploy-web-staging.yml'
  workflow_dispatch:

concurrency:
  group: deploy-web-staging
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          missing=""
          [ -z "${{ secrets.VERCEL_TOKEN }}" ] && missing="$missing VERCEL_TOKEN"
          [ -z "${{ secrets.VERCEL_ORG_ID }}" ] && missing="$missing VERCEL_ORG_ID"
          [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ] && missing="$missing VERCEL_PROJECT_ID"
          if [ -n "$missing" ]; then
            echo "::error::Missing secrets:$missing. Configure them in Settings → Secrets."
            exit 1
          fi

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Smoke test — frontend loads
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5; do
            if curl --fail --silent --show-error --max-time 10 --output /dev/null https://sse-web-staging.vercel.app; then
              echo "Web is up"
              exit 0
            fi
            echo "attempt $i: not up yet, retrying in 5s..."
            sleep 5
          done
          echo "Smoke test failed after 5 attempts"
          exit 1

      - name: Smoke test — API proxy routes (CA5)
        run: |
          set -euo pipefail
          BASE=https://sse-web-staging.vercel.app
          FAILED=0

          # /api/health must return 200 — unauthenticated liveness probe
          HEALTH=$(curl --silent --max-time 15 --output /dev/null --write-out "%{http_code}" "$BASE/api/health")
          if [ "$HEALTH" != "200" ]; then
            echo "::error::Smoke test FAILED: GET $BASE/api/health → $HEALTH (expected 200 — proxy or backend down)"
            FAILED=1
          else
            echo "PASS: GET $BASE/api/health → $HEALTH"
          fi

          # Authenticated routes must return 401 (proxy working + auth guard active) — not 404/502/000
          for path in "api/tenants/me/wizard/status" "api/customers"; do
            STATUS=$(curl --silent --max-time 15 --output /dev/null --write-out "%{http_code}" "$BASE/$path")
            if [ "$STATUS" = "404" ] || [ "$STATUS" = "502" ] || [ "$STATUS" = "503" ] || [ "$STATUS" = "000" ]; then
              echo "::error::Smoke test FAILED: GET $BASE/$path → $STATUS (expected 401 — proxy not working or backend unreachable)"
              FAILED=1
            else
              echo "PASS: GET $BASE/$path → $STATUS"
            fi
          done

          [ "$FAILED" = "0" ] || exit 1
          echo "All API proxy smoke tests passed"
