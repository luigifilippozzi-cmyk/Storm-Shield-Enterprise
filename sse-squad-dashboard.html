<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storm Shield Enterprise — Squad Dashboard</title>
<style>
:root{--bg:#0F172A;--surface:#1E293B;--surface2:#334155;--border:#475569;--text:#E2E8F0;--text2:#94A3B8;--navy:#1B3A5C;--teal:#0D9488;--green:#22C55E;--green-bg:rgba(34,197,94,.12);--yellow:#EAB308;--yellow-bg:rgba(234,179,8,.12);--red:#EF4444;--red-bg:rgba(239,68,68,.12);--blue:#3B82F6;--blue-bg:rgba(59,130,246,.12);--purple:#A855F7;--orange:#F97316}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
.header{background:linear-gradient(135deg,var(--navy),#0F172A);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:12px}
.logo{width:40px;height:40px;background:linear-gradient(135deg,var(--teal),var(--blue));border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:#fff}
.header h1{font-size:18px;font-weight:700}
.header h1 span{color:var(--text2);font-weight:400;font-size:13px;margin-left:8px}
.header-right{display:flex;align-items:center;gap:12px;font-size:12px;color:var(--text2)}
.health-badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.health-verde{background:var(--green-bg);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.health-amarelo{background:var(--yellow-bg);color:var(--yellow);border:1px solid rgba(234,179,8,.3)}
.health-vermelho{background:var(--red-bg);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.container{max-width:1400px;margin:0 auto;padding:20px 24px}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center;transition:transform .2s}
.kpi:hover{transform:translateY(-2px)}
.kpi-value{font-size:28px;font-weight:800;color:var(--teal)}
.kpi-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.kpi-sub{font-size:10px;color:var(--text2);margin-top:2px}
.section{margin-bottom:20px}
.section-title{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.card-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-header h3{font-size:14px;font-weight:600}
.card-body{padding:16px}
.phase-bar{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(71,85,105,.3)}
.phase-bar:last-child{border-bottom:none}
.phase-name{min-width:200px;font-size:13px;font-weight:600}
.phase-progress{flex:1;height:24px;background:rgba(71,85,105,.3);border-radius:6px;overflow:hidden;position:relative}
.phase-fill{height:100%;border-radius:6px;transition:width .8s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:11px;font-weight:700;min-width:fit-content}
.phase-stats{min-width:120px;text-align:right;font-size:12px;color:var(--text2)}
.phase-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;margin-left:8px}
.badge-verde{background:var(--green-bg);color:var(--green)}
.badge-amarelo{background:var(--yellow-bg);color:var(--yellow)}
.badge-vermelho{background:var(--red-bg);color:var(--red)}
.badge-futuro{background:rgba(148,163,184,.12);color:var(--text2)}
.tabs{display:flex;gap:0;margin-bottom:0;border-bottom:2px solid var(--border)}
.tab{padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--text2);transition:all .2s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--teal);border-bottom-color:var(--teal)}
.tab-count{background:var(--surface2);padding:1px 6px;border-radius:8px;font-size:10px;margin-left:4px}
.tab-panel{display:none;padding:12px 0}
.tab-panel.active{display:block}
.alert-item{padding:10px 12px;background:var(--surface2);border-radius:8px;margin-bottom:8px;font-size:13px;display:flex;align-items:flex-start;gap:10px;border-left:3px solid}
.alert-item.bloqueante{border-left-color:var(--red)}
.alert-item.risco{border-left-color:var(--yellow)}
.alert-item.overdue{border-left-color:var(--orange)}
.alert-item.proximo{border-left-color:var(--blue)}
.alert-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.alert-text strong{display:block;margin-bottom:2px}
.alert-text span{color:var(--text2);font-size:12px}
.infra-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.infra-item{background:var(--surface2);border-radius:8px;padding:12px;display:flex;align-items:center;gap:10px}
.infra-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.infra-dot.green{background:var(--green)}
.infra-dot.red{background:var(--red)}
.infra-dot.yellow{background:var(--yellow)}
.infra-label{font-size:12px}
.infra-label strong{display:block;font-size:13px}
.infra-label span{color:var(--text2);font-size:11px}
.inconsistency{padding:8px 12px;background:rgba(249,115,22,.08);border-left:3px solid var(--orange);border-radius:0 8px 8px 0;margin-bottom:6px;font-size:12px}
.reco{padding:10px 12px;background:var(--surface2);border-radius:8px;margin-bottom:8px;font-size:13px;display:flex;gap:10px}
.reco-num{background:var(--teal);color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.squad-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.squad-item{background:var(--surface2);border-radius:8px;padding:12px}
.squad-item h4{font-size:12px;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.squad-item p{font-size:13px}
.footer{text-align:center;padding:20px;color:var(--text2);font-size:11px}
.new-badge{background:var(--green-bg);color:var(--green);padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;margin-left:6px}
.warn-badge{background:var(--red-bg);color:var(--red);padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;margin-left:6px}
@media(max-width:768px){.kpi-row{grid-template-columns:repeat(2,1fr)}.phase-name{min-width:120px;font-size:12px}.header{padding:12px 16px}.container{padding:16px}.phase-stats{min-width:80px;font-size:11px}}
@media(max-width:480px){.kpi-row{grid-template-columns:repeat(2,1fr)}.phase-bar{flex-wrap:wrap}.phase-name{min-width:100%}.infra-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">S</div>
    <h1 id="headerTitle">Storm Shield Enterprise<span>Squad Dashboard</span></h1>
  </div>
  <div class="header-right">
    <span id="healthBadge" class="health-badge"></span>
    <span id="lastUpdate"></span>
  </div>
</div>

<div class="container">

  <!-- KPIs -->
  <div class="kpi-row" id="kpiRow"></div>

  <!-- Phase Progress -->
  <div class="section">
    <div class="section-title">Progresso por Fase</div>
    <div class="card">
      <div class="card-body" id="phaseContainer"></div>
    </div>
  </div>

  <!-- Alerts -->
  <div class="section">
    <div class="section-title">Alertas Ativos</div>
    <div class="card">
      <div class="tabs" id="alertTabs"></div>
      <div class="card-body" id="alertPanels"></div>
    </div>
  </div>

  <!-- Infrastructure -->
  <div class="section">
    <div class="section-title">Infraestrutura CI/CD</div>
    <div class="card">
      <div class="card-body">
        <div class="infra-grid" id="infraGrid"></div>
      </div>
    </div>
  </div>

  <!-- Squad -->
  <div class="section">
    <div class="section-title">Squad Status</div>
    <div class="card">
      <div class="card-body">
        <div class="squad-grid" id="squadGrid"></div>
      </div>
    </div>
  </div>

  <!-- Inconsistencies -->
  <div class="section" id="inconsistenciesSection">
    <div class="section-title">Inconsistencias Excel vs Repo</div>
    <div class="card">
      <div class="card-body" id="inconsistenciesBody"></div>
    </div>
  </div>

  <!-- Recommendations -->
  <div class="section">
    <div class="section-title">Recomendacoes Top 3</div>
    <div class="card">
      <div class="card-body" id="recoBody"></div>
    </div>
  </div>

</div>

<div class="footer" id="footerText"></div>

<script>
// <!--METRICS_START-->
const dashboardData = {
  lastUpdated: "2026-04-09T22:00:00-05:00",
  updatedBy: "PM Agent",
  health: "Amarelo",
  healthReason: "Deploy API staging falhando (secrets); 3 tasks at risk com deadline amanha; branch local divergiu de origin/main com merge conflict",
  activeFase: 1,
  kpis: {
    totalTarefas: 121,
    concluidas: 25,
    percentGeral: 21,
    fase1Percent: 72,
    backendModules: 15,
    frontendPages: 27,
    specFiles: 15,
    endpoints: 72,
    emptyModules: 4
  },
  fases: [
    { nome: "Fase 1 — MVP", total: 40, concluidas: 25, emAndamento: 8, naoIniciado: 7, percent: 72, saude: "Amarelo" },
    { nome: "Fase 2 — IA + Integracoes", total: 12, concluidas: 0, emAndamento: 0, naoIniciado: 12, percent: 0, saude: "Futuro" },
    { nome: "Fase 3 — Contabilidade + FAM", total: 25, concluidas: 0, emAndamento: 0, naoIniciado: 25, percent: 0, saude: "Futuro" },
    { nome: "Fase 4 — Compliance Fiscal", total: 16, concluidas: 0, emAndamento: 0, naoIniciado: 16, percent: 0, saude: "Futuro" },
    { nome: "Fase 5 — Mobile + Comunicacao", total: 11, concluidas: 0, emAndamento: 0, naoIniciado: 11, percent: 0, saude: "Futuro" },
    { nome: "Fase 6 — Rental + Analytics", total: 11, concluidas: 0, emAndamento: 0, naoIniciado: 11, percent: 0, saude: "Futuro" },
    { nome: "Fase 7 — Marketplace", total: 6, concluidas: 0, emAndamento: 0, naoIniciado: 6, percent: 0, saude: "Futuro" }
  ],
  alertas: {
    bloqueantes: [
      { titulo: "Merge Conflict: local main divergiu de origin/main", descricao: "apps/web/next.config.js em conflito. Local tem 1 commit, remote tem 4 commits nao integrados. Resolver ANTES de qualquer novo trabalho.", acao: "git merge origin/main e resolver conflito" },
      { titulo: "GitHub Secrets nao registrados", descricao: "FLY_API_TOKEN, VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID, DATABASE_URL_UNPOOLED, NEON_API_KEY ausentes. Deploy API staging FALHANDO.", acao: "PO registrar secrets em github.com/settings" },
      { titulo: "Deploy API Staging: FAILURE", descricao: "Ultimo run 2026-04-09 falhou. Bloqueando 3 tasks de deploy.", acao: "Registrar secrets + re-run workflow" }
    ],
    overdue: [],
    emRisco: [
      { titulo: "Executar deploy Fly.io (1o deploy staging)", descricao: "Inicio prev: 06/04, Fim prev: 10/04. Status: Nao Iniciado. Deadline AMANHA.", acao: "Registrar secrets hoje" },
      { titulo: "Configurar GitHub Actions (deploy-api + deploy-web)", descricao: "Inicio prev: 06/04, Fim prev: 10/04. Status: Nao Iniciado. Deadline AMANHA.", acao: "Depende de secrets" },
      { titulo: "Smoke test URLs publicas + atualizar README", descricao: "Inicio prev: 10/04, Fim prev: 11/04. Depende dos 2 deploys acima.", acao: "Executar apos deploy" }
    ],
    proximos7: [
      { titulo: "Deploy Fly.io — Fim prev: 10/04", descricao: "Bloqueado por secrets" },
      { titulo: "GitHub Actions config — Fim prev: 10/04", descricao: "Bloqueado por secrets" },
      { titulo: "Smoke test staging — Fim prev: 11/04", descricao: "Bloqueado por deploy" }
    ]
  },
  infra: {
    ci: { status: "verde", label: "CI (main)", data: "2026-04-09", descricao: "lint + test + build" },
    deployStaging: { status: "verde", label: "Deploy Staging", data: "2026-04-09", descricao: "Fly.io workflow" },
    deployApi: { status: "vermelho", label: "Deploy API Staging", data: "2026-04-09", descricao: "FAILURE — secrets ausentes" },
    deployWeb: { status: "verde", label: "Deploy Web Staging", data: "2026-04-09", descricao: "SUCCESS (fix 430a794)", extra: "NEW" },
    prsAbertos: []
  },
  squad: {
    ultimaSessaoDM: "N/A",
    subagentes: ["db-reviewer", "frontend-reviewer", "security-reviewer", "test-runner"],
    branchesAtivas: ["feature/SSE-035-consolidation-and-squad-setup (remote)", "feature/SSE-040-missing-module-tests (remote)"],
    ultimoCommit: "430a794 — fix(web): conditionally disable standalone output on Vercel",
    prsMerged: "PR #14 (SSE-040-missing-module-tests) — 4 novos spec files (+924 linhas)"
  },
  inconsistencias: [
    "StorageService implementado no codigo mas 'Upload de fotos (S3/R2)' marcado 'Nao Iniciado' no Excel",
    "Modulos accounting (9 files, 3 specs), fixed-assets (2 files), insurance (5 files) tem codigo mas sao Fase 2/3 — nao rastreados na Fase 1",
    "4 modulos backend vazios: contractors, inventory, notifications, rental — existem como diretorios mas sem arquivos",
    "Local main divergiu de origin/main — 4 commits remotos nao integrados (incl. delete dashboard page.tsx)"
  ],
  recomendacoes: [
    { prioridade: "P0", texto: "RESOLVER MERGE CONFLICT entre local e origin/main imediatamente. Rodar: git merge origin/main, resolver next.config.js, commitar." },
    { prioridade: "P0", texto: "REGISTRAR GitHub Secrets (FLY_API_TOKEN, VERCEL_TOKEN, etc.) para desbloquear deploy API staging e as 3 tasks de deploy com deadline 10-11/04." },
    { prioridade: "P1", texto: "Completar CRUDs em andamento: Vehicle DTOs (70%), Estimate workflow (60%), User Mgmt (50%), Financial entries (40%). Focar nos que estao mais perto de 100% primeiro." }
  ],
  changesSinceLastReview: [
    "Deploy Web Staging: FAILURE -> SUCCESS (fix 430a794 desabilitou standalone output no Vercel)",
    "PR #14 merged: 4 novos spec files para service-orders, insurance, auth, tenants (+924 linhas)",
    "Detectado: local main divergiu de origin/main (4 commits remotos com merge conflict)"
  ]
};
// <!--METRICS_END-->

// === RENDER ===
function render() {
  const d = dashboardData;
  // Health badge
  const hClass = d.health.toLowerCase();
  document.getElementById('healthBadge').className = 'health-badge health-' + hClass;
  document.getElementById('healthBadge').textContent = d.health;
  document.getElementById('lastUpdate').textContent = 'Atualizado: ' + new Date(d.lastUpdated).toLocaleString('pt-BR', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) + ' por ' + d.updatedBy;

  // KPIs
  const kpis = [
    { value: d.kpis.totalTarefas, label: 'Total Tarefas', sub: d.kpis.concluidas + ' concluidas' },
    { value: d.kpis.percentGeral + '%', label: '% Geral', sub: 'Todas as fases' },
    { value: d.kpis.fase1Percent + '%', label: 'Fase 1 (MVP)', sub: '25/40 tarefas' },
    { value: 'F' + d.activeFase, label: 'Fase Ativa', sub: d.health },
    { value: d.kpis.backendModules, label: 'Modulos Backend', sub: d.kpis.emptyModules + ' vazios' },
    { value: d.kpis.frontendPages, label: 'Paginas Frontend', sub: 'Next.js App Router' },
    { value: d.kpis.specFiles, label: 'Spec Files', sub: 'Jest test suites' },
    { value: d.kpis.endpoints, label: 'Endpoints API', sub: 'GET/POST/PUT/PATCH/DELETE' }
  ];
  document.getElementById('kpiRow').innerHTML = kpis.map(k => '<div class="kpi"><div class="kpi-value">' + k.value + '</div><div class="kpi-label">' + k.label + '</div><div class="kpi-sub">' + k.sub + '</div></div>').join('');

  // Phase progress
  const colors = { Verde: 'var(--green)', Amarelo: 'var(--yellow)', Vermelho: 'var(--red)', Futuro: 'var(--surface2)' };
  const badgeClass = { Verde: 'badge-verde', Amarelo: 'badge-amarelo', Vermelho: 'badge-vermelho', Futuro: 'badge-futuro' };
  document.getElementById('phaseContainer').innerHTML = d.fases.map(f => {
    const fillColor = colors[f.saude] || 'var(--surface2)';
    const pct = f.percent;
    return '<div class="phase-bar">' +
      '<div class="phase-name">' + f.nome + '<span class="phase-badge ' + (badgeClass[f.saude]||'badge-futuro') + '">' + f.saude + '</span></div>' +
      '<div class="phase-progress"><div class="phase-fill" style="width:' + Math.max(pct,2) + '%;background:' + fillColor + '">' + (pct > 10 ? pct + '%' : '') + '</div></div>' +
      '<div class="phase-stats">' + f.concluidas + '/' + f.total + ' (' + pct + '%)</div>' +
    '</div>';
  }).join('');

  // Alerts
  const alertTypes = [
    { key: 'bloqueantes', label: 'Bloqueantes', cls: 'bloqueante', icon: '\u26D4' },
    { key: 'overdue', label: 'Overdue', cls: 'overdue', icon: '\u23F0' },
    { key: 'emRisco', label: 'Em Risco', cls: 'risco', icon: '\u26A0\uFE0F' },
    { key: 'proximos7', label: 'Proximos 7d', cls: 'proximo', icon: '\uD83D\uDCC5' }
  ];
  let tabsHtml = '', panelsHtml = '';
  alertTypes.forEach((t, i) => {
    const items = d.alertas[t.key] || [];
    const active = i === 0 ? ' active' : '';
    tabsHtml += '<div class="tab' + active + '" onclick="switchTab(this,' + i + ')">' + t.label + '<span class="tab-count">' + items.length + '</span></div>';
    panelsHtml += '<div class="tab-panel' + active + '" data-panel="' + i + '">';
    if (items.length === 0) {
      panelsHtml += '<div style="color:var(--text2);font-size:13px;padding:8px">Nenhum alerta nesta categoria.</div>';
    } else {
      items.forEach(a => {
        panelsHtml += '<div class="alert-item ' + t.cls + '"><span class="alert-icon">' + t.icon + '</span><div class="alert-text"><strong>' + a.titulo + '</strong><span>' + a.descricao + (a.acao ? ' | Acao: ' + a.acao : '') + '</span></div></div>';
      });
    }
    panelsHtml += '</div>';
  });
  document.getElementById('alertTabs').innerHTML = tabsHtml;
  document.getElementById('alertPanels').innerHTML = panelsHtml;

  // Infrastructure
  const infraItems = [d.infra.ci, d.infra.deployStaging, d.infra.deployApi, d.infra.deployWeb];
  document.getElementById('infraGrid').innerHTML = infraItems.map(item => {
    const dotCls = item.status === 'verde' ? 'green' : item.status === 'vermelho' ? 'red' : 'yellow';
    const extra = item.extra ? '<span class="new-badge">' + item.extra + '</span>' : '';
    return '<div class="infra-item"><div class="infra-dot ' + dotCls + '"></div><div class="infra-label"><strong>' + item.label + extra + '</strong><span>' + item.descricao + ' — ' + item.data + '</span></div></div>';
  }).join('') + (d.infra.prsAbertos.length > 0 ? '<div class="infra-item"><div class="infra-dot yellow"></div><div class="infra-label"><strong>PRs Abertos: ' + d.infra.prsAbertos.length + '</strong></div></div>' : '<div class="infra-item"><div class="infra-dot green"></div><div class="infra-label"><strong>PRs Abertos: 0</strong><span>Nenhum PR pendente</span></div></div>');

  // Squad
  document.getElementById('squadGrid').innerHTML =
    '<div class="squad-item"><h4>Ultimo Commit</h4><p>' + d.squad.ultimoCommit + '</p></div>' +
    '<div class="squad-item"><h4>PR Recente</h4><p>' + d.squad.prsMerged + '</p></div>' +
    '<div class="squad-item"><h4>Subagentes</h4><p>' + d.squad.subagentes.join(', ') + '</p></div>' +
    '<div class="squad-item"><h4>Branches Remotas</h4><p>' + (d.squad.branchesAtivas.length > 0 ? d.squad.branchesAtivas.join('<br>') : 'Nenhuma') + '</p></div>';

  // Changes since last review
  if (d.changesSinceLastReview && d.changesSinceLastReview.length > 0) {
    const changesHtml = d.changesSinceLastReview.map(c => '<div style="padding:6px 10px;background:var(--green-bg);border-left:3px solid var(--green);border-radius:0 6px 6px 0;margin-bottom:6px;font-size:12px">' + c + '</div>').join('');
    const section = document.createElement('div');
    section.className = 'section';
    section.innerHTML = '<div class="section-title">Mudancas desde ultima revisao</div><div class="card"><div class="card-body">' + changesHtml + '</div></div>';
    document.getElementById('inconsistenciesSection').before(section);
  }

  // Inconsistencies
  if (d.inconsistencias.length === 0) {
    document.getElementById('inconsistenciesSection').style.display = 'none';
  } else {
    document.getElementById('inconsistenciesBody').innerHTML = d.inconsistencias.map(i => '<div class="inconsistency">' + i + '</div>').join('');
  }

  // Recommendations
  document.getElementById('recoBody').innerHTML = d.recomendacoes.map((r, i) => '<div class="reco"><div class="reco-num">' + (i+1) + '</div><div><strong style="color:' + (r.prioridade === 'P0' ? 'var(--red)' : 'var(--yellow)') + '">[' + r.prioridade + ']</strong> ' + r.texto + '</div></div>').join('');

  // Footer
  document.getElementById('footerText').innerHTML = 'Storm Shield Enterprise &mdash; Squad Dashboard &mdash; Atualizado ' + new Date(d.lastUpdated).toLocaleDateString('pt-BR') + ' por ' + d.updatedBy + '<br>Fontes: Git, GitHub Actions, Excel Gerencial, .claude/agents/';
}

function switchTab(el, idx) {
  el.parentElement.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelector('.tab-panel[data-panel="' + idx + '"]').classList.add('active');
}

document.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
